# Default monitor

monitor=,preferred,auto,1

# Apps to be executed on launch
exec-once = waybar & udiskie & wal -R --cols16
exec-once = dunst &
exec-once = awww-daemon
exec-once = swaync
exec-once = awww init
exec-once = awww img ~/wall/bg_16.png


# Extra files
source = ~/.config/hypr/binds.conf

# Environment variables
env = GDK_BACKEND=wayland,x11 QT_QPA_PLATFORM="wayland;xcb" SDL_VIDEODRIVER=wayland CLUTTER_BACKEND=wayland XDG_CURRENT_DESKTOP=Hyprland XDG_SESSION_TYPE=wayland XDG_SESSION_DESKTOP=Hyprland QT_WAYLAND_DISABLE_WINDOWDECORATION=1 QT_QPA_PLATFORMTHEME=qt5ct

# Settings related to input devs
input {
    kb_layout = us

    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }

    sensitivity = 0
}

general {
    gaps_in = 5
    gaps_out = 13
    border_size = 1
    col.active_border = rgba(56b6c2aa)
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 10

    blur {
        enabled = false
            
            }

    #drop_shadow = true
    inactive_opacity = 0.9

    #shadow_range = 5
    #shadow_render_power = 2
    #col.shadow = rgb(18181F)
}

animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = easeOutCubic, 0.33, 1, 0.68, 1

    animation = windows, 1, 7, myBezier
    animation = windowsIn, 1, 7, myBezier, slide
    animation = windowsOut, 1, 7, default, slide
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 10, easeOutCubic, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}
windowrulev = fakefullscreen, class:^(code-url-handler)$
windowrulev = suppressevent maximize, class:.*
